# ============================================================
# TCC — Override para Experimento de Pool Proporcional
#
# Objetivo científico: isolar se a vantagem do Go no spike (+81%)
# é do scheduler M:N ou da contenção do HikariCP (200 conn / 500 VUs).
#
# Uso:
#   docker-compose -f docker-compose.yml -f docker-compose.pool-experiment.yml up -d
#   k6 run -e SCENARIO=spike -e TARGET_URL=http://localhost:8081/payments scripts/benchmarks/stress_test.js
#
# Hipótese: com pool=500, Java deve se aproximar de Go no spike.
# Se isso ocorrer: a diferença era do pool, não do scheduler.
# Se não ocorrer: o scheduler M:N do Go é genuinamente superior.
# ============================================================
services:
  backend-java:
    environment:
      - HIKARI_MAX_POOL_SIZE=500

  backend-go:
    environment:
      - PG_MAX_CONNS=500

  postgres-db:
    # Aumenta max_connections para comportar os pools expandidos
    command: ["postgres", "-c", "max_connections=1200"]
