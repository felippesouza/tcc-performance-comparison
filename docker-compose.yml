services:
  # ─────────────────────────────────────────────────────────────
  # INFRAESTRUTURA
  # ─────────────────────────────────────────────────────────────

  postgres-db:
    image: postgres:16-alpine
    container_name: tcc-postgres
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gateway_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: tcc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-api:
    build:
      context: ./apps/mock-external-api
    container_name: tcc-mock-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MIN_LATENCY_MS=200
      - MAX_LATENCY_MS=500

  # ─────────────────────────────────────────────────────────────
  # BACKENDS (Os dois concorrentes do TCC)
  # ─────────────────────────────────────────────────────────────

  backend-java:
    build:
      context: ./apps/backend-java
    container_name: tcc-backend-java
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/gateway_db
      - EXTERNAL_API_BASE_URL=http://mock-api:8080
      - SPRING_DATA_REDIS_HOST=redis-cache
      - HIKARI_MAX_POOL_SIZE=${HIKARI_MAX_POOL_SIZE:-200}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      mock-api:
        condition: service_started

  backend-go:
    build:
      context: ./apps/backend-go
    container_name: tcc-backend-go
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://user:password@postgres-db:5432/gateway_db
      - MOCK_API_URL=http://mock-api:8080/process-payment
      - REDIS_URL=redis://redis-cache:6379
      - PORT=8082
      - PG_MAX_CONNS=${PG_MAX_CONNS:-200}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      mock-api:
        condition: service_started

  backend-quarkus:
    build:
      context: ./apps/backend-quarkus
    container_name: tcc-backend-quarkus
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=gateway_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_HOST=redis-cache
      - EXTERNAL_API_URL=http://mock-api:8080
      - AGROAL_MAX_POOL_SIZE=${AGROAL_MAX_POOL_SIZE:-200}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      mock-api:
        condition: service_started

  # ─────────────────────────────────────────────────────────────
  # OBSERVABILIDADE (Coleta e visualização das métricas do TCC)
  # ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: tcc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - backend-java
      - backend-go
      - backend-quarkus

  grafana:
    image: grafana/grafana:11.0.0
    container_name: tcc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=tcc2025
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/tcc-comparison.json
    volumes:
      - ./scripts/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
