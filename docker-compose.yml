services:
  # Banco de Dados Principal
  postgres-db:
    image: postgres:16-alpine
    container_name: tcc-postgres
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gateway_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache
  redis-cache:
    image: redis:7-alpine
    container_name: tcc-redis
    ports:
      - "6379:6379"

  # API Externa Mockada (Antifraude / Adquirente)
  mock-api:
    build:
      context: ./apps/mock-external-api
    container_name: tcc-mock-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MIN_LATENCY_MS=200
      - MAX_LATENCY_MS=500

  # Concorrente 1: Backend Java 25 (Virtual Threads)
  backend-java:
    build:
      context: ./apps/backend-java
    container_name: tcc-backend-java
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/gateway_db
      - EXTERNAL_API_BASE_URL=http://mock-api:8080
      - SPRING_DATA_REDIS_HOST=redis-cache
    depends_on:
      postgres-db:
        condition: service_healthy
      mock-api:
        condition: service_started

  # Concorrente 2: Backend Go 1.25 (Goroutines)
  backend-go:
    build:
      context: ./apps/backend-go
    container_name: tcc-backend-go
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://user:password@postgres-db:5432/gateway_db
      - MOCK_API_URL=http://mock-api:8080/process-payment
      - PORT=8082
    depends_on:
      postgres-db:
        condition: service_healthy
      mock-api:
        condition: service_started
