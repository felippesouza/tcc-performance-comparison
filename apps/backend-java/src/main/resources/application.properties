# Configuração do Servidor
server.port=8081

# Graceful Shutdown: aguarda requests em-flight completarem antes de encerrar.
# Simetrico ao graceful shutdown com os.Signal no backend Go.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Ativação das Virtual Threads (Loom) no Spring Boot
spring.threads.virtual.enabled=true

# Banco de Dados Postgres (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/gateway_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway — Migrations versionadas (substitui ddl-auto=update)
# Garante schema reproduzível em GCP e ambientes CI/CD
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Tuning HikariCP para Alta Concorrência com Virtual Threads
# Pool size configurável via env var para experimento de spike (500 VUs):
# testar 500 conexões vs 200 e isolar se vantagem do Go vem do scheduler ou contention no pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:200}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis (Cache de Idempotência)
# Previne cobrança duplicada em retries: a chave X-Idempotency-Key é armazenada por 24h
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging estruturado configurado via logback-spring.xml

# Configurações da API Externa Mockada
external.api.base-url=http://localhost:8080
external.api.path=/process-payment

# Actuator & Métricas (Serão o coração da sua análise científica)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# OpenAPI / Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
