# Ativação das Virtual Threads (Loom) no Spring Boot
spring.threads.virtual.enabled=true

# Banco de Dados Postgres (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/gateway_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis (Cache de Idempotência)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Log para ver o nome das threads
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Configurações da API Externa Mockada
external.api.url=http://localhost:8080/process-payment

# Actuator & Métricas (Serão o coração da sua análise científica)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# OpenAPI / Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
