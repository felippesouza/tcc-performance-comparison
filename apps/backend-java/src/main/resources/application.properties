# Configuração do Servidor
server.port=8081

# Ativação das Virtual Threads (Loom) no Spring Boot
spring.threads.virtual.enabled=true

# Banco de Dados Postgres (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/gateway_db
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Tuning HikariCP para Alta Concorrência com Virtual Threads
spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis (Cache de Idempotência)
# Previne cobrança duplicada em retries: a chave X-Idempotency-Key é armazenada por 24h
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Log para ver o nome das threads
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Configurações da API Externa Mockada
external.api.base-url=http://localhost:8080
external.api.path=/process-payment

# Actuator & Métricas (Serão o coração da sua análise científica)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# OpenAPI / Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
