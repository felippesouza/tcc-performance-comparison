# Server
quarkus.http.port=8083
quarkus.shutdown.timeout=30

# Thread pool — default = CPUs×8 (32–64 on Colima), insufficient for I/O-bound workloads
# Must be >= max VUs to avoid thread exhaustion; each request holds a thread for ~400–500ms
quarkus.thread-pool.max-threads=${QUARKUS_MAX_THREADS:600}
quarkus.thread-pool.queue-size=1000

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:user}
quarkus.datasource.password=${DB_PASSWORD:password}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gateway_db}
quarkus.datasource.jdbc.max-size=${AGROAL_MAX_POOL_SIZE:200}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.acquisition-timeout=5S

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Redis
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
# Default pool is 6 — catastrophic under load (500 VUs × 2 Redis ops = 1000 concurrent requests)
quarkus.redis.max-pool-size=${REDIS_MAX_POOL_SIZE:200}
quarkus.redis.max-pool-waiting=500

# External API
external.api.base-url=${EXTERNAL_API_URL:http://localhost:8080}
external.api.path=${EXTERNAL_API_PATH:/process-payment}

# REST Client
quarkus.rest-client.external-api.url=${EXTERNAL_API_URL:http://localhost:8080}
quarkus.rest-client.external-api.connect-timeout=3000
quarkus.rest-client.external-api.read-timeout=5000

# Observability
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/actuator/prometheus
quarkus.smallrye-health.root-path=/actuator/health

# Management
%prod.quarkus.management.enabled=false

# OpenAPI
quarkus.smallrye-openapi.path=/api-docs
quarkus.swagger-ui.path=/swagger-ui.html
quarkus.swagger-ui.always-include=true

# Logging (JSON structured)
quarkus.log.console.json=true
quarkus.log.console.json.additional-field.app.value=backend-quarkus
quarkus.log.console.json.additional-field.runtime.value=quarkus-native

# Native image config
%prod.quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces
